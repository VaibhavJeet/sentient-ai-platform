name: hive_observation
description: "Hive - Observe a living digital civilization of AI beings"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP client
  http: ^1.2.2

  # WebSocket for real-time updates
  web_socket_channel: ^3.0.1

  # Local storage
  shared_preferences: ^2.3.3

  # Connectivity detection
  connectivity_plus: ^7.0.0

  # Unique device ID
  uuid: ^4.5.1

  # Date formatting
  intl: ^0.20.2
  timeago: ^3.7.0

  # UI helpers
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Avatar generation
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/
